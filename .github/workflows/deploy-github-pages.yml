name: Deploy to GitHub Pages

on:
  # 每天北京时间早上 7:00 (UTC 时间 23:00)
  schedule:
    - cron: '0 23 * * *'

  # 手动触发
  workflow_dispatch:

  # 推送到 master 分支时触发(可选)
  push:
    branches: [master]

  # 允许从其他 workflow 调用
  workflow_call:

# 设置权限
permissions:
  contents: read
  pages: write
  id-token: write

# 防止并发部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Pages
        uses: actions/configure-pages@v4

      - name: 上传到 GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # 上传整个目录
          path: '.'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 输出部署 URL
        run: |
          echo "部署成功! 🚀"
          echo "URL: https://itech001.github.io/the-ai-era/"
